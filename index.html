<!doctype html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <script type="module" src="js/cell.js"></script>
    <script type="module" src="js/grid.js"></script>
    <script type="module" src="js/game.js"></script>
    <script type="module" src="js/script.js"></script>
  </head>

  <body>
    <canvas id="gameOfLifeCanvas"></canvas>
    <div id="hud">FPS: --</div>
    <div id="menuScreen">
      <div id="menuPanel">
        <h1>LIFE</h1>

        <label for="fpsSlider">FPS Target: <span id="fpsValue">15</span></label>
        <input
          type="range"
          id="fpsSlider"
          min="1"
          max="144"
          step="1"
          value="15"
        />
        <div class="sliderRange"><span>1</span><span>144</span></div>

        <label for="scaleSlider">Scale: <span id="scaleValue">20</span></label>
        <input
          type="range"
          id="scaleSlider"
          min="1"
          max="100"
          step="1"
          value="20"
        />
        <div class="sliderRange"><span>1</span><span>100</span></div>

        <label for="initialPercentAliveSlider"
          >Initial Percent Alive:
          <span id="initialPercentAliveValue">40</span></label
        >
        <input
          type="range"
          id="initialPercentAliveSlider"
          min="0"
          max="100"
          step="1"
          value="40"
        />
        <div class="sliderRange"><span>0</span><span>100</span></div>

        <label for="fpsToggle" class="toggleLabel">
          <input type="checkbox" id="fpsToggle" checked />
          Show FPS counter
        </label>

        <label for="colorStillToggle" class="toggleLabel">
          <input type="checkbox" id="colorStillToggle" checked />
          Color Still Life Differently
        </label>

        <label for="drawGridLinesToggle" class="toggleLabel">
          <input type="checkbox" id="drawGridLinesToggle" checked />
          Draw Gridlines
        </label>

        <br />
        <button id="startBtn">GO</button>
      </div>
    </div>
  </body>
</html>
